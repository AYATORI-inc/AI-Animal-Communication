<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>どうぶつえさやりひろば</title>
  <meta name="gas-url" content="https://script.google.com/a/macros/happy-epo8.com/s/AKfycbxN_lNgpMEsQ1_bCu2uPeMZT_byjb0bId_g9IbBWAecG6hFVWTpuvgzrkLVT0affBXpqA/exec">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bgScene" aria-hidden="true"></div>

  <div class="appShell">
    <main class="appMain">
      <section class="screen isActive" id="screenSelect" aria-label="動物選択">
        <div class="titleScreen">
          <div class="selectLogoWrap">
            <img class="selectLogoTop" src="./img/daimei.png" alt="どうぶつえさやりひろば タイトルロゴ">
          </div>

          <div class="animalRowWide" role="group" aria-label="どうぶつをえらぶ">
            <button class="pickTile" data-animal="lion" type="button">
              <span class="tileFrame">
                <img class="tileImg" src="./img/raion.webp" alt="ライオン">
              </span>
              <span class="tileTag">ライオン</span>
            </button>

            <button class="pickTile" data-animal="penguin" type="button">
              <span class="tileFrame">
                <img class="tileImg" src="./img/pengin.webp" alt="ペンギン">
              </span>
              <span class="tileTag">ペンギン</span>
            </button>

            <button class="pickTile" data-animal="capybara" type="button">
              <span class="tileFrame">
                <img class="tileImg" src="./img/kapipara.webp" alt="カピバラ">
              </span>
              <span class="tileTag">カピバラ</span>
            </button>

            <button class="pickTile" data-animal="panda" type="button">
              <span class="tileFrame">
                <img class="tileImg" src="./img/panda.webp" alt="パンダ">
              </span>
              <span class="tileTag">パンダ</span>
            </button>
          </div>

          <div class="titlePrompt">どの　どうぶつに　えさを　あげる？</div>
        </div>
      </section>

      <section class="screen" id="screenGame" aria-label="えさ選択">
        <div class="card gameCard">
          <div class="gameLayout">
            <aside class="gameAnimalCol">
              <div class="begBox">
                <div class="begLabel">おねだり</div>
                <div class="begLine" id="begLine">…</div>
              </div>

              <div class="animalShow">
                <img id="animalImg" src="" alt="">
              </div>
            </aside>

            <section class="gameActionCol">
              <h2 class="panelTitle">えさを えらんでね</h2>

              <div class="foodGrid" aria-label="えさのせんたく">
                <button class="foodBtn" data-quick="にく" type="button">
                  <img class="foodBtnIcon" src="./img/oniku1.png" alt="">
                  <span>にく</span>
                </button>

                <button class="foodBtn" data-quick="くさ" type="button">
                  <img class="foodBtnIcon" src="./img/kusa2.png" alt="">
                  <span>くさ</span>
                </button>

                <button class="foodBtn" data-quick="たいや" type="button">
                  <img class="foodBtnIcon" src="./img/taiya3.png" alt="">
                  <span>たいや</span>
                </button>

                <button class="foodBtn" data-quick="げきからりょうり" type="button">
                  <img class="foodBtnIcon" src="./img/gekikara4.png" alt="">
                  <span>げきからりょうり</span>
                </button>
              </div>

              <div class="freeBox">
                <label class="srOnly" for="freeInput">自由入力</label>
                <input
                  id="freeInput"
                  class="input"
                  type="text"
                  maxlength="50"
                  placeholder="じゆうに えさを いれてね（例：魔法のジュース / 手作りハンバーグ）"
                >
                <div class="freeActions">
                  <button id="btnSend" class="btn primary" type="button">えさを あげる</button>
                  <button id="btnBackToSelect" class="btn ghost" type="button">どうぶつを かえる</button>
                </div>
              </div>
            </section>
          </div>
        </div>
      </section>

      <section class="screen" id="screenResult" aria-label="けっか">
        <div class="card resultCard">
          <div class="resultHeader">
            <div class="resultHeaderIcon">🏁</div>
            <div>
              <div class="resultTitle">けっか</div>
              <div class="resultSub" id="resultSub">入力：—</div>
            </div>
          </div>

          <div class="resultBody">
            <div class="resultLeft">
              <div class="resultAnimalPanel">
                <div class="resultEmoji" id="resultEmoji">✨</div>

                <div class="resultAnimalPic">
                  <img id="resultAnimalImg" src="" alt="">
                </div>

                <div class="resultBadges">
                  <span class="badge" id="resultFoodBadge">えさ：—</span>
                  <span class="badge badgeMood" id="resultMoodBadge">きぶん：—</span>
                </div>
              </div>
            </div>

            <div class="resultRight">
              <div class="resultTextPanel">
                <div class="resultSectionTitle">かんそう</div>
                <pre class="resultText" id="resultText">—</pre>
              </div>

              <div class="resultImagePanel" id="resultImageWrap">
                <div class="resultSectionTitle">イラスト</div>

                <div class="resultImagePlaceholder" id="resultImagePlaceholder">
                  <div class="phTitle">イラストを じゅんびしています…</div>
                  <div class="phSub">ちょっと まってね…</div>
                </div>

                <img
                  class="resultImage isHidden"
                  id="resultImage"
                  src=""
                  alt=""
                  tabindex="0"
                  role="button"
                  aria-label="生成画像を拡大表示"
                >
              </div>
            </div>
          </div>

          <div class="resultActions">
            <button id="btnRetryImage" class="btn" type="button">もういちど</button>
            <button id="btnCopyGas" class="btn ghost" type="button">れすぽんす を こぴー</button>
            <button id="btnResultBack" class="btn primary" type="button">どうぶつせんたくへ</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="appFooter">©AYATORI-INC</footer>
  </div>

  <div class="loadingOverlay" id="loadingOverlay" aria-hidden="true">
    <div class="loadingCard">
      <div class="loadingAnimal bob">
        <img id="loadingAnimalImg" src="" alt="">
      </div>
      <div class="loadingText">
        <strong>もぐもぐ…</strong>
        <p id="loadingLine">動物が味わっています…</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
    <span id="toastText"></span>
    <button id="toastClose" class="toastClose" type="button" aria-label="閉じる">×</button>
  </div>

  <div class="imgModal isHidden" id="imgModal" aria-hidden="true">
    <div class="imgModalBackdrop" id="imgModalBackdrop"></div>
    <div class="imgModalPanel" role="dialog" aria-modal="true" aria-label="画像拡大表示">
      <button id="imgModalClose" class="imgModalClose" type="button" aria-label="閉じる">×</button>
      <img id="imgModalImg" class="imgModalImg" src="" alt="">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
